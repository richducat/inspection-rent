    <title>Inspector Gadgets · York Inspections</title>
    <script>
      // ALWAYS run the latest deploy. This checks the deployed shell on EVERY
      // document load (boot, manual refresh, iOS tab restore) AND whenever the
      // inspector returns to the app after being away — so a long-lived field
      // device can never sit on a stale (crashy) build. It is:
      //   • loop-safe — only bounces to a DIFFERENT hash, and refuses to bounce
      //     to the same target twice inside 20s (guards the window where GitHub
      //     Pages' CDN is still propagating a deploy and the reload can't yet
      //     fetch the version we just saw, which would otherwise reload-storm);
      //   • data-safe — it bounces at load time (before any edit exists) and on
      //     return-after-away, NOT mid-edit; a quick camera/file-picker round
      //     trip (< 45s) is excluded so a reload can't race an in-flight photo
      //     import; and the app itself flushes unsaved work on hide/pagehide +
      //     a 60s autosave, so any reload resumes from saved state.
      (function () {
        function currentHash() {
          var s = (document.querySelector('script[type="module"][src*="index-"]') || {}).src || "";
          return (s.match(/index-[A-Za-z0-9_-]+\.js/) || [])[0];
        }
        var checking = false;
        // Reload to this same page — but PRESERVING any query params (e.g.
        // Stripe's ?subscribed=1 / ?checkout=cancelled, which App.tsx reads on
        // boot) — with a unique _r stamp so the navigation misses the CDN cache
        // and pulls the new HTML.
        function bounceUrl() {
          try {
            var sp = new URLSearchParams(location.search);
            sp.set("_r", String(Date.now()));
            return location.pathname + "?" + sp.toString() + location.hash;
          } catch (e) {
            return location.pathname + "?_r=" + Date.now() + location.hash;
          }
        }
        function checkAndReload() {
          if (checking) return; // one in-flight check at a time
          var have = currentHash();
          if (!have) return; // dev server — no hashed bundle to compare
          checking = true;
          fetch(location.pathname + "?_v=" + Date.now(), { cache: "no-store" })
            .then(function (res) { return res.ok ? res.text() : ""; })
            .then(function (html) {
              var fresh = (html.match(/index-[A-Za-z0-9_-]+\.js/) || [])[0];
              if (!fresh || fresh === have) {
                // Already on the latest build — clear any stale flap marker.
                try { sessionStorage.removeItem("hia:bounce-to"); } catch (e) {}
                return;
              }
              // A different build is live. Avoid a reload storm: if we ALREADY
              // bounced toward this exact hash < 20s ago and still didn't land on
              // it, the CDN is mid-propagation — skip this round and let the next
              // natural load / return retry once it has settled.
              var mark = "";
              try { mark = sessionStorage.getItem("hia:bounce-to") || ""; } catch (e) {}
              var parts = mark.split("|");
              if (parts[0] === fresh && Date.now() - (+parts[1] || 0) < 20000) return;
              try { sessionStorage.setItem("hia:bounce-to", fresh + "|" + Date.now()); } catch (e) {}
              location.replace(bounceUrl());
            })
            .catch(function () {})
            .then(function () { checking = false; });
        }
        try {
          // Strip only our own _r marker on landing — keep every other query
          // param so App.tsx still sees Stripe/deep-link params after a bounce.
          try {
            var landSp = new URLSearchParams(location.search);
            if (landSp.has("_r")) {
              landSp.delete("_r");
              var landQs = landSp.toString();
              history.replaceState(null, "", location.pathname + (landQs ? "?" + landQs : "") + location.hash);
            }
          } catch (e) {}
          // Every document load lands on the latest build.
          checkAndReload();
          // Re-check whenever the inspector's attention RETURNS to the app after
          // being away a bit — covers a backgrounded tab (visibilitychange), an
          // OS app-switch on desktop (window blur/focus), and a bfcache back-nav
          // (pageshow). NOT a quick (<45s) glance away, so a reload can't race an
          // in-flight photo import. We update on these natural return boundaries
          // rather than a raw timer, which would interrupt an actively-edited tab.
          // NEVER auto-reload a RUNNING app while the inspector is actively working
          // (labeling photos, mid-import) — the app sets window.__hiaNoReload while
          // the Photos view is open or an import is running. A reload there is
          // data-safe (autosave flushes on hide) but yanks them out of labeling,
          // which is exactly what Beth reported. The every-document-LOAD check above
          // is unaffected, so a fresh load / manual refresh still lands on latest.
          function busy() {
            try { return !!window.__hiaNoReload; } catch (e) { return false; }
          }
          var awayAt = 0;
          function markAway() { if (!awayAt) awayAt = Date.now(); }
          function onReturn() {
            var was = awayAt; awayAt = 0;
            if (was && Date.now() - was > 45000 && !busy()) checkAndReload();
          }
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") markAway(); else onReturn();
          });
          window.addEventListener("blur", markAway);
          window.addEventListener("focus", onReturn);
          window.addEventListener("pageshow", function (e) {
            // A bfcache restore never re-runs this script, so re-check directly
