    <title>Inspector Gadgets · York Inspections</title>
    <script>
      // Pick up new deploys — but ONLY on the first load of a tab session, and
      // NEVER once the app has booted. A field inspector who switches to the
      // camera and back triggers an iOS tab reload; auto-swapping the bundle
      // then (or looping when the CDN briefly serves two versions) would
      // interrupt an in-progress inspection and drop unsaved edits. So: at most
      // one version check, before any editing is possible; every later reload
      // just loads the current bundle and restores saved work.
      (function () {
        function currentHash() {
          var s = (document.querySelector('script[type="module"][src*="index-"]') || {}).src || "";
          return (s.match(/index-[A-Za-z0-9_-]+\.js/) || [])[0];
        }
        // Compare the loaded bundle to a freshly-fetched shell; if a newer deploy
        // exists, bounce to it ONCE per session (guarded so a flapping CDN can't
        // loop). Called before first edit, and again when the inspector returns
        // after being away — the app flushes unsaved work on hide, so a reload on
        // return is data-safe.
        function checkAndReload() {
          if (sessionStorage.getItem("hia:ver-reload")) return; // one bounce per session
          var have = currentHash();
          if (!have) return; // dev server — nothing to compare
          fetch(location.pathname + "?_v=" + Date.now(), { cache: "no-store" })
            .then(function (res) { return res.ok ? res.text() : ""; })
            .then(function (html) {
              var fresh = (html.match(/index-[A-Za-z0-9_-]+\.js/) || [])[0];
              if (fresh && fresh !== have && !sessionStorage.getItem("hia:ver-reload")) {
                sessionStorage.setItem("hia:ver-reload", "1");
                location.replace(location.pathname + "?_r=" + Date.now() + location.hash);
              }
            })
            .catch(function () {});
        }
        try {
          if (location.search.indexOf("_r=") !== -1) {
            history.replaceState(null, "", location.pathname + location.hash);
          }
          // First load of a tab session: check before any editing is possible. A
          // mid-session reload / tab restore skips this so it can't interrupt an
          // in-progress inspection — the visibility check below covers those.
          if (!sessionStorage.getItem("hia:booted")) {
            checkAndReload();
          }
          // Long-lived mobile tabs never re-run the first-load check, so they can
          // sit on a stale (crashy) build for days. When the inspector leaves the
          // app and comes back after a while — NOT a quick camera snap — re-check
          // and update onto the latest build.
          var hiddenAt = 0;
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") {
              hiddenAt = Date.now();
            } else if (document.visibilityState === "visible" && hiddenAt && Date.now() - hiddenAt > 45000) {
              checkAndReload();
            }
          });
        } catch (e) {}
      })();
    </script>
